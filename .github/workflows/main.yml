name: Build Mandarin WOTD JSON

on:
  schedule:
    # GitHub Actions cron is UTC: 00:05 UTC == 00:05 GMT in winter, 01:05 BST
    # in summer. The word itself is keyed off Europe/London date in
    # tools/build_wotd.py, so a single UTC cron just past midnight is enough.
    - cron: "5 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # HSK CSVs (chinese,pinyin,english) — we’ll combine all levels:
      HSK_URLS: >
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk1.csv
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk2.csv
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk3.csv
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk4.csv
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk5.csv
        https://raw.githubusercontent.com/plaktos/hsk_csv/master/hsk6.csv
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build base today.json
        run: |
          python tools/build_wotd.py

      - name: Add example sentence via Claude Code (OAuth)
        uses: anthropics/claude-code-base-action@beta
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Read,Edit,Write"
          max_turns: "3"
          prompt: |
            Read ./today.json. It contains a Mandarin word-of-the-day with
            fields: hanzi, pinyin, definition, hsk_level, date.

            Write ONE natural Chinese example sentence that uses the EXACT
            hanzi, with vocabulary and grammar at or below the entry's
            hsk_level so a learner studying that word can read it. Aim for
            roughly 8–18 Chinese characters. Provide a faithful (not
            word-for-word) English translation.

            Edit today.json to add three new fields after the existing ones:
              "example_cn": <the Chinese sentence>
              "example_en": <the English translation>
              "example_source": "Claude Code (OAuth)"

            Preserve all existing fields exactly. Output must be valid JSON,
            indented with 2 spaces, with a trailing newline.

      - name: Debug workspace
        run: |
          echo "PWD=$(pwd)"
          echo "Branch ref: ${{ github.ref }}"
          echo "Branch name: ${{ github.ref_name }}"
          ls -la

      - name: Commit and push today.json
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global safe.directory '*'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Make sure we’re on the right branch (esp. for workflow_dispatch / schedule)
          git checkout "$BRANCH_NAME"

          # Show the file we expect
          ls -la today.json || true
          echo "git status before:"
          git status --porcelain

          # Stage & commit if changed or new
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes (today.json may match current)."
          else
            git commit -m "Update today.json (WOTD)"
          fi

          # Push (won’t error if nothing to push)
          git push origin "$BRANCH_NAME" || true

          echo "git status after:"
          git status --porcelain

